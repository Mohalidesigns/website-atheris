    <line x1="65" y1="35" x2="95" y2="35" stroke="#fff" stroke-width="2" opacity="0.2"/>
    <path d="M20 75 L32 87 L55 60" fill="none" stroke="#2D7D46" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="65" y1="75" x2="95" y2="75" stroke="#fff" stroke-width="2" opacity="0.2"/>
