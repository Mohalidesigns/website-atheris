    <path d="M40 75 L55 90 L85 55" fill="none" stroke="#2D7D46" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Category badge -->
  <rect x="80" y="100" width="260" height="36" rx="18" fill="#D4AF37" opacity="0.15"/>
  <text x="100" y="124" font-family="Arial, sans-serif" font-size="15" font-weight="600" fill="#D4AF37">CBN REGULATORY UPDATES</text>
  <!-- Title -->
