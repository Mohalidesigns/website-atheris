    <line x1="25" y1="70" x2="95" y2="70" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="25" y1="95" x2="80" y2="95" stroke="#fff" stroke-width="2" opacity="0.3"/>
    <line x1="25" y1="120" x2="90" y2="120" stroke="#fff" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Shield icon -->
