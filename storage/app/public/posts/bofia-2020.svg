    </linearGradient>
    <linearGradient id="accent1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#F0D060"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg1)"/>
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="200" fill="#D4AF37" opacity="0.05"/>
  <circle cx="1100" cy="180" r="150" fill="#2D7D46" opacity="0.05"/>
  <circle cx="150" cy="550" r="180" fill="#D4AF37" opacity="0.04"/>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="135" x2="1200" y2="135"/><line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="405" x2="1200" y2="405"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="240" y1="0" x2="240" y2="675"/><line x1="480" y1="0" x2="480" y2="675"/>
    <line x1="720" y1="0" x2="720" y2="675"/><line x1="960" y1="0" x2="960" y2="675"/>
  </g>
  <!-- Document icon -->
